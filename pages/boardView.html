<!DOCTYPE html>
<html>
    <head>
        <title>Frames - Board</title>
        <link rel="stylesheet" href="../style/boardView.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../assets/favicon.ico" />
    </head>

    <body>
        <h1 id="boardName">Board Name</h1>

        <div class="colList" id="cols">

            <div class="col">
          <h2>Column Title</h2>
    
                <div class="card">
                    <h3>Card Title</h3>
                    <div class="labels">
                    <div class="perms">Label 1</div>
                    <div class="perms">Label 2</div>
                </div>

                <div class="perms">Due Date</div>
                </div>

                
                <div class="card">
                    <h3>Card Title</h3>
                    <div class="perms">Label 1</div>
                </div>

                <button class="newCard" onclick="createCardModal()">New Card</button>


                
                


        </div>


      

<button class="newCol" onclick="createColModal()">New Column</button>



                    
</div>


<div class="modalOverlay" id="modalOverlay">
    <div class="createModalCol" id="createModalCol">
        <div class="loginItem">
            <p class="loginText">Column Name</p>
            <input type="text" placeholder="exampleColumn" class="loginField" id="COLname">
        </div>
    
     

        <button class="authButtonL" onclick="createColumn()">Create Column</button>

        </div>


</div>

<div class="modalOverlay" id="modalOverlayCard">


<div class="createModalCard" id="createModalCard">
    <div class="loginItem">
        <p class="loginText">Card Name</p>
        <input type="text" placeholder="exampleCard" class="loginField" id="CRDname">
    </div>

    <div class="loginItem">
        <p class="loginText">Card Description</p>
        <span>
        <textarea type="text" placeholder="This card is an amazing card that is really helpful in explaining how things occur." class="cardDisc" id="CRDdisc"></textarea>
        </span>
    </div>
 

    <button class="authButtonL" onclick="createCard()">Create Card</button>

    </div>

    </div>


    
    </div>
    
    <div class="modalOverlayCardView" id="modalOverlayCardView">
        <div class="createModalCardView" id="createModalCardView">

            <h3 id="cardTitleModal">Card Title</h3>
            <div class="labelsList" id="labelsList">
            <div class="cardLabels">Label 1</div>
            <div class="cardLabels">Label 1</div>
            </div>

          <input class="cardDiscModal" placeholder="Enter a description!" id="cardDiscModal">


          <div class="options">
            <input class="cardOptions" id="labelsOption" placeholder="Labels">
            <button class="cardOptions">Move</button>
            <input class="cardOptions" id="dueDateOption" placeholder="Due Date">
            <button class="cardOptions">Manage Card</button>


          </div>
    
            </div>
    

    </body>
</html>

<script src="../scripts/boardView.js"></script>
